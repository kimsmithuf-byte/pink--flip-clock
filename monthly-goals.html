<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Monthly Goals</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #120006;
  font-family: Georgia, serif;
}

body {
  background-image: url("monthly-goals-background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.content {
  position: absolute;
  left: 52%;
  top: 48%;
  transform: translate(-50%, -50%);
  width: 58%;
  color: #fff1e6;
  text-align: center;
}

.title {
  color: #f4a6bd;
  font-size: 34px;
  font-weight: bold;
  margin-bottom: 6px;
}

.subtitle {
  color: #f4a6bd;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 18px;
}

.goal-section {
  text-align: left;
  margin: 11px auto;
  width: 82%;
}

.goal-section h2 {
  color: #f4a6bd;
  font-size: 18px;
  margin-bottom: 5px;
}

.goal {
  font-size: 15px;
  line-height: 1.45;
}

.progress-title {
  color: #f4a6bd;
  font-size: 17px;
  margin-top: 18px;
  margin-bottom: 10px;
}

.progress-item {
  width: 82%;
  margin: 8px auto;
  text-align: left;
  font-size: 13px;
  color: #fff1e6;
}

.bar {
  width: 100%;
  height: 9px;
  border: 1px solid #f4a6bd;
  border-radius: 20px;
  margin-top: 4px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #f4a6bd;
  box-shadow: 0 0 12px #f4a6bd;
}

.health { width: 25%; }
.lsat { width: 40%; }
.finance { width: 20%; }
.career { width: 10%; }
</style>
</head>

<body>
<div class="content">

  <div class="title">♡ JULY GOALS</div>
  <div class="subtitle">DISCIPLINE • CONSISTENCY • GROWTH</div>

  <div class="goal-section">
    <h2>🌸 Health</h2>
    <div class="goal">☐ Lose 5 pounds this month</div>
    <div class="goal">☐ Exercise 5 days a week</div>
  </div>

  <div class="goal-section">
    <h2>📚 LSAT</h2>
    <div class="goal">☐ Study 10 hours a week</div>
  </div>

  <div class="goal-section">
    <h2>💰 Finance</h2>
    <div class="goal">☐ Save $1,500 this month</div>
  </div>

  <div class="goal-section">
    <h2>💼 Career</h2>
    <div class="goal">☐ Start taking leads for insurance</div>
  </div>

  <div class="progress-title">♡ Monthly Progress</div>

  <div class="progress-item">
    Health
    <div class="bar"><div class="fill health"></div></div>
  </div>

  <div class="progress-item">
    LSAT
    <div class="bar"><div class="fill lsat"></div></div>
  </div>

  <div class="progress-item">
    Finance
    <div class="bar"><div class="fill finance"></div></div>
  </div>

  <div class="progress-item">
    Career
    <div class="bar"><div class="fill career"></div></div>
  </div>

</div>
</body>
</html>
