<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Pink Flip Clock</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050005;
}

.widget {
  position: relative;
  width: 100vw;
  height: 100vh;
  background-image: url("background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.clock {
  position: absolute;
  left: 50%;
  top: 63.5%;
  transform: translate(-50%, -50%);
  width: 58%;
  height: 18%;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2.1vw;

  font-family: Georgia, serif;
  font-weight: bold;
  color: #ffd5ec;
  text-shadow:
    0 0 8px #ff4eb3,
    0 0 18px #ff4eb3,
    0 0 35px #ff4eb3;
}

.num {
  min-width: 8vw;
  text-align: center;
  font-size: 6.2vw;
  line-height: 1;
}

.colon {
  font-size: 5.6vw;
  line-height: 1;
  margin-top: -0.3vw;
}

.ampm {
  font-size: 2.5vw;
  line-height: 1;
  margin-left: -0.4vw;
  margin-top: -1.4vw;
}

.flip {
  animation: flip .45s ease;
}

@keyframes flip {
  0% { transform: rotateX(0deg); opacity: 1; }
  50% { transform: rotateX(90deg); opacity: .55; }
  100% { transform: rotateX(0deg); opacity: 1; }
}
</style>
</head>

<body>
  <div class="widget">
    <div class="clock">
      <div class="num" id="h">00</div>
      <div class="colon">:</div>
      <div class="num" id="m">00</div>
      <div class="colon">:</div>
      <div class="num" id="s">00</div>
      <div class="ampm" id="ampm">PM</div>
    </div>
  </div>

<script>
let last = {};

function updateClock() {
  const now = new Date();

  let h = now.getHours();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  const values = {
    h: String(h).padStart(2, "0"),
    m: String(now.getMinutes()).padStart(2, "0"),
    s: String(now.getSeconds()).padStart(2, "0"),
    ampm: ampm
  };

  for (const id in values) {
    const el = document.getElementById(id);

    if (last[id] !== values[id]) {
      el.textContent = values[id];
      el.classList.remove("flip");
      void el.offsetWidth;
      el.classList.add("flip");
      last[id] = values[id];
    }
  }
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
