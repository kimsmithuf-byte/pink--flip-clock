<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Life HQ Clock V2</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #020002;
      font-family: "Poppins", sans-serif;
      color: #ffe1ef;
    }

    .widget {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 12% 65%, rgba(255, 48, 150, .32), transparent 24%),
        radial-gradient(circle at 88% 55%, rgba(255, 48, 150, .28), transparent 25%),
        radial-gradient(circle at 50% 50%, rgba(255, 95, 190, .12), transparent 52%),
        linear-gradient(135deg, #030003 0%, #090106 48%, #030003 100%);
      border: 1px solid rgba(255, 80, 175, .8);
      box-shadow:
        inset 0 0 100px rgba(255, 55, 155, .24),
        0 0 35px rgba(255, 55, 155, .32);
    }

    .sparkles {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,220,238,.95) 1px, transparent 2px),
        radial-gradient(circle, rgba(255,85,175,.75) 1px, transparent 2px);
      background-size: 85px 85px, 145px 145px;
      opacity: .22;
      animation: sparkle 4s infinite alternate ease-in-out;
    }

    .glow-line-top,
    .glow-line-bottom {
      position: absolute;
      left: 3%;
      width: 94%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ff4fae, transparent);
      box-shadow: 0 0 16px #ff4fae;
      opacity: .9;
    }

    .glow-line-top { top: 5%; }
    .glow-line-bottom { bottom: 5%; }

    .panel {
      width: 94%;
      height: 88%;
      border-radius: 22px;
      position: relative;
      z-index: 2;
      border: 1.5px solid rgba(255, 78, 170, .85);
      background:
        linear-gradient(rgba(0,0,0,.12), rgba(0,0,0,.58)),
        radial-gradient(circle at left center, rgba(255, 55, 150, .20), transparent 34%),
        radial-gradient(circle at right center, rgba(255, 55, 150, .20), transparent 34%);
      box-shadow:
        0 0 30px rgba(255, 60, 160, .45),
        inset 0 0 70px rgba(255, 80, 170, .13);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .corner-art {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      font-size: 95px;
      filter: drop-shadow(0 0 18px rgba(255,65,160,.9));
      opacity: .92;
    }

    .rose-left { left: 34px; bottom: 22px; }
    .rose-right { right: 36px; bottom: 30px; font-size: 110px; }
    .candle-left { left: 42px; top: 35px; font-size: 78px; opacity: .75; }
    .candle-right { right: 50px; top: 42px; font-size: 68px; opacity: .68; }

    .title {
      font-family: "Playfair Display", serif;
      font-size: 43px;
      letter-spacing: 5px;
      font-weight: 800;
      color: #ffc5df;
      margin-bottom: 22px;
      text-shadow:
        0 0 10px rgba(255, 185, 225, 1),
        0 0 25px rgba(255, 60, 160, .95),
        0 0 45px rgba(255, 40, 145, .55);
      z-index: 5;
    }

    .clock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 5;
    }

    .flip {
      width: 175px;
      height: 128px;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 42%),
        linear-gradient(135deg, #070105, #1b0613 55%, #050003);
      border: 2px solid rgba(255, 93, 178, .98);
      box-shadow:
        0 0 18px rgba(255, 70, 165, .95),
        0 0 45px rgba(255, 40, 145, .48),
        inset 0 0 24px rgba(255, 140, 205, .18),
        0 18px 38px rgba(0,0,0,.78);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,.88);
      box-shadow: 0 0 8px rgba(255,180,220,.45);
      z-index: 5;
    }

    .flip::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255, 165, 215, .12);
      z-index: 4;
    }

    .num {
      font-size: 90px;
      font-weight: 800;
      color: #ff77b8;
      line-height: 1;
      z-index: 6;
      text-shadow:
        0 0 10px rgba(255, 210, 235, 1),
        0 0 25px rgba(255, 50, 155, 1),
        0 0 48px rgba(255, 50, 155, .65);
    }

    .colon {
      font-size: 72px;
      font-weight: 800;
      color: #ff77b8;
      text-shadow:
        0 0 12px rgba(255, 210, 235, 1),
        0 0 28px rgba(255, 50, 155, .9);
    }

    .ampm {
      width: 92px;
      height: 108px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), transparent 45%),
        linear-gradient(135deg, #070105, #160510);
      border: 2px solid rgba(255, 93, 178, .95);
      box-shadow:
        0 0 18px rgba(255, 70, 165, .9),
        0 0 35px rgba(255, 40, 145, .35),
        inset 0 0 18px rgba(255, 140, 205, .13);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffacd0;
      font-size: 30px;
      font-weight: 800;
      z-index: 5;
    }

    .date {
      margin-top: 20px;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: 27px;
      color: #ffc5df;
      text-shadow: 0 0 14px rgba(255, 70, 165, .8);
      z-index: 5;
    }

    .divider {
      margin: 7px 0 4px;
      color: #ff83c1;
      letter-spacing: 11px;
      font-size: 18px;
      z-index: 5;
    }

    .quote {
      font-family: "Playfair Display", serif;
      font-size: 21px;
      font-style: italic;
      color: #ffe2ef;
      text-shadow: 0 0 12px rgba(255, 70, 165, .6);
      z-index: 5;
    }

    .flip-animate { animation: flip .42s ease; }

    @keyframes flip {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(-22deg) scale(.98); }
      100% { transform: rotateX(0deg); }
    }

    @keyframes sparkle {
      from { opacity: .12; }
      to { opacity: .28; }
    }

    @media (max-width: 900px) {
      .panel { width: 95%; height: 88%; }
      .title { font-size: 30px; margin-bottom: 16px; }
      .clock { gap: 10px; }
      .flip { width: 112px; height: 88px; }
      .num { font-size: 58px; }
      .colon { font-size: 44px; }
      .ampm { width: 62px; height: 75px; font-size: 22px; }
      .date { font-size: 20px; }
      .quote { font-size: 15px; }
      .corner-art { font-size: 44px; }
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="sparkles"></div>
    <div class="glow-line-top"></div>
    <div class="glow-line-bottom"></div>

    <div class="panel">
      <div class="corner-art candle-left">🕯️</div>
      <div class="corner-art candle-right">🕯️</div>
      <div class="corner-art rose-left">🌹</div>
      <div class="corner-art rose-right">🌹</div>

      <div class="title">♡ LIFE HQ ♡</div>

      <div class="clock">
        <div class="flip" id="hBox"><div class="num" id="hours">00</div></div>
        <div class="colon">:</div>
        <div class="flip" id="mBox"><div class="num" id="minutes">00</div></div>
        <div class="colon">:</div>
        <div class="flip" id="sBox"><div class="num" id="seconds">00</div></div>
        <div class="ampm" id="ampm">AM</div>
      </div>

      <div class="date" id="date"></div>
      <div class="divider">♡ ─ ♡ ─ ♡</div>
      <div class="quote">discipline today, freedom tomorrow ✨</div>
    </div>
  </div>

  <script>
    let lastHours = "";
    let lastMinutes = "";
    let lastSeconds = "";

    function flipBox(id) {
      const box = document.getElementById(id);
      box.classList.remove("flip-animate");
      void box.offsetWidth;
      box.classList.add("flip-animate");
    }

    function updateClock() {
      const now = new Date();

      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");
      const ampm = hours >= 12 ? "PM" : "AM";

      hours = hours % 12 || 12;
      hours = String(hours).padStart(2, "0");

      if (hours !== lastHours) {
        document.getElementById("hours").textContent = hours;
        flipBox("hBox");
        lastHours = hours;
      }

      if (minutes !== lastMinutes) {
        document.getElementById("minutes").textContent = minutes;
        flipBox("mBox");
        lastMinutes = minutes;
      }

      if (seconds !== lastSeconds) {
        document.getElementById("seconds").textContent = seconds;
        flipBox("sBox");
        lastSeconds = seconds;
      }

      document.getElementById("ampm").textContent = ampm;

      document.getElementById("date").textContent =
        now.toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
