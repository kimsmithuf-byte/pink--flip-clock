<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pink Flip Clock</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050005;
  }

  body {
    background-image: url("background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .clock {
    position: absolute;
    left: 33.7%;
    top: 60.5%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 2.1vw;
    font-family: Georgia, serif;
    color: #ffd2ea;
    text-shadow: 0 0 12px #ff3fa8, 0 0 25px #ff3fa8;
    font-weight: bold;
  }

  .num {
    width: 9vw;
    text-align: center;
    font-size: 5.8vw;
  }

  .colon {
    font-size: 5vw;
    margin-top: -0.5vw;
  }

  .ampm {
    font-size: 2.7vw;
    margin-left: -0.5vw;
  }
</style>
</head>

<body>
  <div class="clock">
    <div class="num" id="h">00</div>
    <div class="colon">:</div>
    <div class="num" id="m">00</div>
    <div class="colon">:</div>
    <div class="num" id="s">00</div>
    <div class="ampm" id="ampm">PM</div>
  </div>

<script>
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  document.getElementById("h").textContent = String(h).padStart(2, "0");
  document.getElementById("m").textContent = String(now.getMinutes()).padStart(2, "0");
  document.getElementById("s").textContent = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("ampm").textContent = ampm;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
