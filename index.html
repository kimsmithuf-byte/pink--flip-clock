<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Life HQ Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #020002;
      font-family: "Poppins", sans-serif;
      color: #ffd7ea;
    }

    .widget {
      height: 100vh;
      width: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 55%, rgba(255, 55, 150, .20), transparent 24%),
        radial-gradient(circle at 82% 55%, rgba(255, 60, 160, .18), transparent 24%),
        radial-gradient(circle at center, rgba(255, 80, 170, .10), transparent 55%),
        linear-gradient(135deg, #030003 0%, #090106 50%, #030003 100%);
      border: 1px solid rgba(255, 91, 176, .75);
      box-shadow:
        inset 0 0 90px rgba(255, 60, 160, .22),
        0 0 35px rgba(255, 60, 160, .25);
    }

    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 190, 225, .85) 1px, transparent 2px),
        radial-gradient(circle, rgba(255, 65, 160, .45) 1px, transparent 2px);
      background-size: 95px 95px, 145px 145px;
      opacity: .18;
      animation: sparkle 5s ease-in-out infinite alternate;
    }

    .panel {
      width: 94%;
      height: 88%;
      border-radius: 22px;
      position: relative;
      z-index: 2;
      border: 1.5px solid rgba(255, 91, 176, .8);
      background:
        linear-gradient(rgba(0, 0, 0, .18), rgba(0, 0, 0, .56)),
        radial-gradient(circle at 18% 55%, rgba(255, 70, 155, .18), transparent 28%),
        radial-gradient(circle at 82% 55%, rgba(255, 70, 155, .18), transparent 28%);
      box-shadow:
        0 0 28px rgba(255, 72, 165, .42),
        inset 0 0 60px rgba(255, 72, 165, .13);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .title {
      font-family: "Playfair Display", serif;
      font-size: 44px;
      letter-spacing: 5px;
      color: #ffc0dc;
      text-shadow:
        0 0 12px rgba(255, 110, 190, .95),
        0 0 28px rgba(255, 45, 150, .85);
      margin-bottom: 22px;
    }

    .clock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .flip {
      width: 175px;
      height: 130px;
      border-radius: 19px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 38%),
        linear-gradient(135deg, #070105, #1b0714 50%, #040003);
      border: 2px solid rgba(255, 95, 178, .95);
      box-shadow:
        0 0 18px rgba(255, 70, 165, .95),
        0 0 42px rgba(255, 45, 150, .45),
        inset 0 0 24px rgba(255, 135, 200, .16),
        0 16px 35px rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,.9);
      z-index: 5;
    }

    .num {
      font-size: 90px;
      font-weight: 800;
      color: #ff7fbd;
      line-height: 1;
      text-shadow:
        0 0 10px rgba(255, 200, 230, 1),
        0 0 25px rgba(255, 45, 155, 1),
        0 0 45px rgba(255, 45, 155, .60);
      z-index: 6;
    }

    .colon {
      font-size: 72px;
      font-weight: 800;
      color: #ff78b9;
      text-shadow: 0 0 18px rgba(255, 55, 160, 1);
    }

    .ampm {
      width: 92px;
      height: 108px;
      border-radius: 17px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 42%),
        linear-gradient(135deg, #070105, #170611);
      border: 2px solid rgba(255, 95, 178, .95);
      box-shadow:
        0 0 18px rgba(255, 70, 165, .85),
        inset 0 0 18px rgba(255, 135, 200, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffadd1;
      font-size: 30px;
      font-weight: 800;
    }

    .date {
      margin-top: 20px;
      font-family: "Playfair Display", serif;
      font-size: 27px;
      font-style: italic;
      color: #ffc4dc;
      text-shadow: 0 0 14px rgba(255, 70, 165, .75);
    }

    .divider {
      margin: 8px 0 5px;
      color: #ff7fbd;
      letter-spacing: 10px;
      font-size: 18px;
    }

    .quote {
      font-family: "Playfair Display", serif;
      font-size: 21px;
      font-style: italic;
      color: #ffe2ef;
      text-shadow: 0 0 12px rgba(255, 70, 165, .55);
    }

    .rose, .candle {
      position: absolute;
      z-index: 3;
      opacity: .9;
      filter: drop-shadow(0 0 18px rgba(255, 55, 155, .9));
      pointer-events: none;
    }

    .rose.one { left: 42px; bottom: 28px; font-size: 85px; }
    .rose.two { right: 48px; bottom: 35px; font-size: 96px; }
    .candle.one { left: 55px; top: 42px; font-size: 76px; opacity: .7; }
    .candle.two { right: 60px; top: 52px; font-size: 66px; opacity: .6; }

    .flip-animate { animation: flip .42s ease; }

    @keyframes flip {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(-20deg) scale(.98); }
      100% { transform: rotateX(0deg); }
    }

    @keyframes sparkle {
      from { opacity: .10; }
      to { opacity: .24; }
    }

    @media (max-width: 900px) {
      .panel { height: 88%; width: 94%; }
      .title { font-size: 30px; margin-bottom: 15px; }
      .clock { gap: 10px; }
      .flip { width: 112px; height: 88px; }
      .num { font-size: 58px; }
      .colon { font-size: 45px; }
      .ampm { width: 62px; height: 75px; font-size: 22px; }
      .date { font-size: 20px; }
      .quote { font-size: 15px; }
      .rose.one, .rose.two, .candle.one, .candle.two { font-size: 44px; }
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="panel">
      <div class="candle one">🕯️</div>
      <div class="candle two">🕯️</div>
      <div class="rose one">🌹</div>
      <div class="rose two">🌹</div>

      <div class="title">♡ LIFE HQ ♡</div>

      <div class="clock">
        <div class="flip" id="hBox"><div class="num" id="hours">00</div></div>
        <div class="colon">:</div>
        <div class="flip" id="mBox"><div class="num" id="minutes">00</div></div>
        <div class="colon">:</div>
        <div class="flip" id="sBox"><div class="num" id="seconds">00</div></div>
        <div class="ampm" id="ampm">AM</div>
      </div>

      <div class="date" id="date"></div>
      <div class="divider">♡ ─ ♡ ─ ♡</div>
      <div class="quote">discipline today, freedom tomorrow ✨</div>
    </div>
  </div>

  <script>
    let lastHours = "";
    let lastMinutes = "";
    let lastSeconds = "";

    function flipBox(id) {
      const box = document.getElementById(id);
      box.classList.remove("flip-animate");
      void box.offsetWidth;
      box.classList.add("flip-animate");
    }

    function updateClock() {
      const now = new Date();

      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");
      const ampm = hours >= 12 ? "PM" : "AM";

      hours = hours % 12 || 12;
      hours = String(hours).padStart(2, "0");

      if (hours !== lastHours) {
        document.getElementById("hours").textContent = hours;
        flipBox("hBox");
        lastHours = hours;
      }

      if (minutes !== lastMinutes) {
        document.getElementById("minutes").textContent = minutes;
        flipBox("mBox");
        lastMinutes = minutes;
      }

      if (seconds !== lastSeconds) {
        document.getElementById("seconds").textContent = seconds;
        flipBox("sBox");
        lastSeconds = seconds;
      }

      document.getElementById("ampm").textContent = ampm;

      document.getElementById("date").textContent =
        now.toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
