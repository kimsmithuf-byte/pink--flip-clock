<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Life HQ Flip Clock</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      background: #020002;
      color: #ffd6ea;
    }

    .widget {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 72, 165, .75);
      background:
        radial-gradient(circle at 15% 55%, rgba(255, 35, 130, .18), transparent 28%),
        radial-gradient(circle at 85% 45%, rgba(255, 50, 150, .20), transparent 30%),
        radial-gradient(circle at center, rgba(255, 90, 180, .08), transparent 55%),
        linear-gradient(135deg, #030003 0%, #0b0208 45%, #030003 100%);
      box-shadow:
        inset 0 0 80px rgba(255, 45, 145, .22),
        0 0 35px rgba(255, 45, 145, .35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 185, 220, .9) 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255, 70, 165, .5) 1px, transparent 2px);
      background-size: 90px 90px, 140px 140px;
      opacity: .18;
      animation: twinkle 5s ease-in-out infinite alternate;
    }

    .rose-left, .rose-right, .candle-left, .candle-right {
      position: absolute;
      pointer-events: none;
      filter: drop-shadow(0 0 20px rgba(255, 59, 150, .8));
      opacity: .9;
    }

    .rose-left {
      left: 28px;
      bottom: 18px;
      font-size: 88px;
    }

    .rose-right {
      right: 36px;
      bottom: 42px;
      font-size: 100px;
    }

    .candle-left {
      left: 55px;
      top: 42px;
      font-size: 92px;
      opacity: .75;
    }

    .candle-right {
      right: 52px;
      top: 58px;
      font-size: 72px;
      opacity: .65;
    }

    .content {
      width: 94%;
      height: 86%;
      border-radius: 18px;
      border: 1px solid rgba(255, 80, 170, .75);
      background:
        linear-gradient(rgba(0, 0, 0, .30), rgba(0, 0, 0, .55)),
        radial-gradient(circle at center, rgba(255, 50, 145, .10), transparent 60%);
      box-shadow:
        0 0 28px rgba(255, 60, 160, .42),
        inset 0 0 55px rgba(255, 80, 170, .12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      position: relative;
    }

    .title {
      font-family: "Playfair Display", serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #ffc0dc;
      text-shadow:
        0 0 12px rgba(255, 87, 175, .95),
        0 0 30px rgba(255, 40, 145, .85);
      margin-bottom: 22px;
    }

    .clock {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .flip {
      width: 170px;
      height: 125px;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 120, 190, .16), rgba(0, 0, 0, .08)),
        linear-gradient(135deg, #080106, #1a0714 48%, #030003);
      border: 2px solid rgba(255, 90, 175, .95);
      box-shadow:
        0 0 20px rgba(255, 62, 160, .95),
        0 0 46px rgba(255, 40, 145, .42),
        inset 0 0 20px rgba(255, 120, 190, .16),
        0 14px 30px rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,.85);
      z-index: 4;
    }

    .flip::after {
      content: "";
      position: absolute;
      top: 0;
      width: 100%;
      height: 45%;
      background: linear-gradient(rgba(255,255,255,.10), transparent);
      z-index: 2;
    }

    .num {
      z-index: 5;
      font-size: 86px;
      font-weight: 800;
      color: #ff7fbd;
      line-height: 1;
      text-shadow:
        0 0 10px rgba(255, 180, 220, 1),
        0 0 25px rgba(255, 38, 145, 1),
        0 0 45px rgba(255, 38, 145, .55);
    }

    .colon {
      font-size: 70px;
      font-weight: 800;
      color: #ff78b9;
      text-shadow: 0 0 18px rgba(255, 55, 160, 1);
    }

    .ampm {
      width: 92px;
      height: 105px;
      border-radius: 16px;
      background: linear-gradient(135deg, #070105, #160611);
      border: 2px solid rgba(255, 90, 175, .95);
      box-shadow:
        0 0 20px rgba(255, 62, 160, .85),
        inset 0 0 18px rgba(255, 120, 190, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffadd1;
      font-size: 30px;
      font-weight: 800;
    }

    .date {
      margin-top: 20px;
      font-family: "Playfair Display", serif;
      font-size: 26px;
      font-style: italic;
      color: #ffc4dc;
      text-shadow: 0 0 14px rgba(255, 70, 165, .75);
    }

    .divider {
      margin: 7px 0 6px;
      color: #ff7fbd;
      letter-spacing: 12px;
      font-size: 18px;
    }

    .quote {
      font-family: "Playfair Display", serif;
      font-size: 20px;
      font-style: italic;
      color: #ffe2ef;
      text-shadow: 0 0 12px rgba(255, 70, 165, .55);
    }

    .flip-animate {
      animation: flip .42s ease;
    }

    @keyframes flip {
      0% { transform: rotateX(0deg); }
      50% { transform: rotateX(-22deg) scale(.98); }
      100% { transform: rotateX(0deg); }
    }

    @keyframes twinkle {
      from { opacity: .10; }
      to { opacity: .24; }
    }

    @media (max-width: 900px) {
      .title { font-size: 30px; }
      .flip { width: 112px; height: 90px; }
      .num { font-size: 58px; }
      .colon { font-size: 48px; }
      .ampm { width: 62px; height: 78px; font-size: 22px; }
      .date { font-size: 20px; }
      .quote { font-size: 16px; }
      .rose-left, .rose-right, .candle-left, .candle-right { font-size: 48px; }
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="sparkles"></div>

    <div class="candle-left">🕯️</div>
    <div class="candle-right">🕯️</div>
    <div class="rose-left">🌹</div>
    <div class="rose-right">🌹</div>

    <div class="content">
      <div class="title">♡ LIFE HQ ♡</div>

      <div class="clock">
        <div class="flip" id="hBox"><div class="num" id="hours">00</div></div>
        <div class="colon">:</div>
        <div class="flip" id="mBox"><div class="num" id="minutes">00</div></div>
        <div class="colon">:</div>
        <div class="flip" id="sBox"><div class="num" id="seconds">00</div></div>
        <div class="ampm" id="ampm">AM</div>
      </div>

      <div class="date" id="date"></div>
      <div class="divider">♡ ─ ♡ ─ ♡</div>
      <div class="quote">discipline today, freedom tomorrow ✨</div>
    </div>
  </div>

  <script>
    let lastHours = "";
    let lastMinutes = "";
    let lastSeconds = "";

    function flipBox(id) {
      const box = document.getElementById(id);
      box.classList.remove("flip-animate");
      void box.offsetWidth;
      box.classList.add("flip-animate");
    }

    function updateClock() {
      const now = new Date();

      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");
      const ampm = hours >= 12 ? "PM" : "AM";

      hours = hours % 12 || 12;
      hours = String(hours).padStart(2, "0");

      if (hours !== lastHours) {
        document.getElementById("hours").textContent = hours;
        flipBox("hBox");
        lastHours = hours;
      }

      if (minutes !== lastMinutes) {
        document.getElementById("minutes").textContent = minutes;
        flipBox("mBox");
        lastMinutes = minutes;
      }

      if (seconds !== lastSeconds) {
        document.getElementById("seconds").textContent = seconds;
        flipBox("sBox");
        lastSeconds = seconds;
      }

      document.getElementById("ampm").textContent = ampm;

      document.getElementById("date").textContent =
        now.toLocaleDateString("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
