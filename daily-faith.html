<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Faith</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Cormorant Garamond',serif;
}

body{

background:url("daily-faith-background.png") center center;
background-size:cover;

display:flex;
justify-content:center;
align-items:center;

}

.content{

width:60%;
height:72%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

color:#ffd6e8;

padding:25px;

}

.date{

font-size:22px;
letter-spacing:1px;
margin-bottom:20px;

}

.title{

font-size:54px;
font-weight:600;
margin-bottom:25px;

}

.verse{

font-size:40px;
line-height:1.45;

font-style:italic;

margin-bottom:30px;

}

.reference{

font-size:28px;

letter-spacing:2px;

margin-bottom:35px;

}

.prayer{

font-family:Poppins,sans-serif;

font-size:22px;

line-height:1.8;

width:90%;

}

</style>

</head>

<body>

<div class="content">

<div class="date">
Wednesday, July 1
</div>

<div class="title">
✝ Daily Faith
</div>

<div class="verse">

“Trust in the Lord with all your heart and lean not on your own understanding.”

</div>

<div class="reference">

PROVERBS 3:5–6

</div>

<div class="prayer">

God, cover my family, my mind, my home, and my purpose today.

Amen.

</div>

</div>

</body>
</html>
